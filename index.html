<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de Production</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div>
    <h1>Pilotage M00</h1>
    <div class="subtitle">Mise à jour quotidienne</div>
  </div>
  <div class="date-box">
    <label for="dateJour">Date du jour :</label>
    <input type="date" id="dateJour">
  </div>
  <span id="fbStatus" class="sync">⏳ Connexion...</span>
  <div id="userBadge" style="display:none">
    <span id="userEmail"></span>
    <button id="btnLogout" onclick="doLogout()">Déconnexion</button>
  </div>
  <button class="btn-print btn" onclick="window.print()">Imprimer</button>
</div>

<div class="wrap">
  <table id="mainTable">
    <thead id="thead">
      <tr id="headerRow">
        <th class="th-top th-label" style="width:110px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="bottombar">
  <button class="btn btn-danger"  onclick="resetAll()">Réinitialiser</button>
  <button class="btn btn-ghost"   onclick="exportCSV()">Exporter CSV</button>
  <button class="btn btn-ghost"   onclick="openHistorique()">📋 Historique</button>
  <button class="btn btn-primary" onclick="addSynthCol()">+ Ajouter colonne synthèse</button>
  <button class="btn btn-primary" onclick="saveFirebase()">Sauvegarder</button>
  <button class="btn btn-ghost"   onclick="openChart()">Graphiques</button>
  <button class="btn btn-primary" onclick="passerJourSuivant()" style="background:#22a050;border-color:#1a7a3c">&#9654; Jour suivant</button>
</div>

<!-- Modal Graphique -->
<div class="modal-overlay" id="chartOverlay">
  <div class="modal-box">
    <button class="close-btn" onclick="closeChart()">&#x2715;</button>
    <h2 id="chartTitle">Taux de réalisation APPROS</h2>
    <div class="chart-tabs" id="sectionTabs">
      <button class="chart-tab active" id="secAPPROS" onclick="switchSection('APPROS')">APPROS</button>
      <button class="chart-tab" id="secPIECES_DEPOSEES" onclick="switchSection('PIECES DEPOSEES')">PIECES DEPOSEES</button>
    </div>
    <div class="chart-tabs">
      <button class="chart-tab active" id="tabCourant" onclick="switchTab('courant')">Vue courante (4 jours)</button>
      <button class="chart-tab" id="tabHistorique" onclick="switchTab('historique')">Historique complet</button>
    </div>
    <canvas class="chart-canvas" id="approsChart" height="320"></canvas>
  </div>
</div>

<!-- Modal Historique -->
<div class="modal-overlay" id="histOverlay">
  <div class="modal-box">
    <button class="close-btn" onclick="closeHistorique()">&#x2715;</button>
    <h2>Historique des sauvegardes</h2>
    <div class="hist-toolbar">
      <label>Du :</label>
      <input type="date" id="histFrom">
      <label>Au :</label>
      <input type="date" id="histTo">
      <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="renderHistTable()">Filtrer</button>
      <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="clearHistFilter()">Tout afficher</button>
    </div>
    <div class="hist-table-wrap" id="histTableWrap"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- App logic -->
<script src="app.js"></script>

</body>
</html>
