<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de Production</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f2f0eb; --surface: #ffffff; --surface2: #e8e5df;
  --border: #c8c4bc; --text: #1a1917; --muted: #7a776f; --accent: #1a4fa0;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; padding: 18px; }
h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

.topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.date-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; }
.date-box label { font-size: 12px; color: var(--muted); }
.date-box input { border: none; background: transparent; font-size: 13px; color: var(--text); outline: none; }
.btn-print { padding: 6px 14px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; }
.btn-print:hover { background: var(--surface2); }

#fbStatus { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
#fbStatus.ok   { background: #d4f0de; color: #1a7a3c; }
#fbStatus.err  { background: #fdeaea; color: #c03030; }
#fbStatus.sync { background: #fff3cd; color: #856404; }

#userBadge { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted); margin-left: auto; }
#userEmail { background: #e8e5df; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
#btnLogout { padding: 4px 10px; font-size: 11px; border: 1px solid #f0cece; border-radius: 6px; background: #fdeaea; color: #c03030; cursor: pointer; font-family: inherit; }

.wrap { overflow-x: auto; }
table { border-collapse: collapse; background: var(--surface); border: 2px solid #555; }
th, td { border: 1px solid #888; padding: 0; vertical-align: top; }

.th-top { background: #e0ddd6; text-align: center; font-size: 12px; font-weight: 600; padding: 4px 6px; }
.th-header-input { display: block; width: 100%; border: none; background: transparent; text-align: center; font-family: inherit; outline: none; }
input.th-date { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
input.th-j { font-size: 11px; color: var(--muted); font-weight: 600; }
input.th-header-input:focus { background: #f0f4ff; }

.th-top.synth-col { background: #d4dff0; position: relative; }
.th-top.synth-col::after { content: 'SYNTHESE'; display: block; font-size: 9px; letter-spacing: .08em; color: var(--accent); margin-top: 2px; }
.btn-del-col { display: block; margin: 3px auto 0; padding: 1px 6px; font-size: 10px; border: 1px solid #f0cece; border-radius: 3px; background: #fdeaea; color: #c03030; cursor: pointer; }
.btn-del-col:hover { background: #fbd5d5; }

.th-label { background: #e0ddd6; font-size: 12px; font-weight: 700; text-align: left; padding: 6px 8px; width: 110px; }

.row-engin td { background: #dbd8d0; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: 4px 8px; }
.row-engin .loco-cell { background: #dbd8d0; }

.row-label td.label { background: #eae7e0; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 5px 7px; vertical-align: middle; color: #444; width: 110px; }
td.data-cell { padding: 3px 4px; min-width: 150px; }
td.data-cell.synth-cell { background: #f4f7fd; min-width: 150px; }
td.data-cell.synth-cell:focus-within { background: #eaf0fb; }

input.engin-label-input { width: 100%; font-size: 11px; color: var(--accent); font-weight: 700; border: none; background: transparent; outline: none; font-family: inherit; padding: 0; }
input.engin-label-input:focus { background: #f0f4ff; }

textarea.note { width: 100%; min-height: 24px; font-size: 12px; font-family: inherit; border: none; background: transparent; resize: none; outline: none; color: #1a4fa0; line-height: 1.4; padding: 2px 3px; overflow: hidden; }
textarea.note:focus { background: #f0f4ff; border-radius: 3px; }

.row-score td { background: #f8f7f4; border-top: 2px dashed #aaa; padding: 4px 6px; }
.row-score td.label { background: #eae7e0; }
.row-score td.synth-cell { background: #eef2fb; }
.score-inner { display: flex; align-items: center; gap: 6px; }

.dot-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #bbb; background: #ddd; cursor: pointer; font-size: 0; transition: transform .1s, border-color .1s; flex-shrink: 0; }
.dot-btn:hover { transform: scale(1.15); }
.dot-btn.green { background: #22a050; border-color: #1a7a3c; }
.dot-btn.red   { background: #d03030; border-color: #a02020; }
.dot-btn.off   { background: #ccc; border-color: #aaa; }

input.score { width: 52px; font-size: 12px; text-align: center; font-weight: 600; color: #1a4fa0; border: 1px solid #ccc; border-radius: 4px; padding: 2px 4px; background: var(--surface); }
input.score:focus { outline: 2px solid var(--accent); border-color: transparent; }

input.loco { font-size: 12px; font-weight: 700; color: #1a4fa0; border: none; background: transparent; outline: none; width: 100%; padding: 2px 4px; }
input.loco:focus { background: #f0f4ff; border-radius: 3px; }

.bottombar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.btn { padding: 7px 16px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-family: inherit; }
.btn-ghost { background: var(--surface); color: var(--muted); }
.btn-ghost:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { background: #143d80; }
.btn-danger { background: var(--surface); color: #c03030; border-color: #f0cece; }
.btn-danger:hover { background: #fdeaea; }

.chart-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
.chart-modal-overlay.open { display: flex; }
.chart-modal { background: #fff; border-radius: 10px; padding: 24px; width: min(900px, 95vw); box-shadow: 0 8px 40px rgba(0,0,0,.3); position: relative; }
.chart-modal h2 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.chart-modal .close-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
.chart-modal .close-btn:hover { color: var(--text); }
canvas#approsChart { width: 100% !important; }

@media print {
  body { padding: 0; background: #fff; }
  .topbar, .bottombar { display: none; }
  input.th-header-input { color: #000 !important; }
  input.engin-label-input { color: var(--accent) !important; }
  .btn-del-col { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Tableau de Suivi de Production</h1>
    <div class="subtitle">Mise a jour quotidienne - synchronisation Firebase</div>
  </div>
  <div class="date-box">
    <label for="dateJour">Date de base :</label>
    <input type="date" id="dateJour">
  </div>
  <span id="fbStatus" class="sync">&#9203; Connexion...</span>
  <div id="userBadge" style="display:none">
    <span id="userEmail"></span>
    <button id="btnLogout" onclick="doLogout()">Deconnexion</button>
  </div>
  <button class="btn-print btn" onclick="window.print()">Imprimer</button>
</div>

<div class="wrap">
  <table id="mainTable">
    <thead id="thead">
      <tr id="headerRow">
        <th class="th-top th-label" style="width:110px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="bottombar">
  <button class="btn btn-danger"  onclick="resetAll()">Reinitialiser</button>
  <button class="btn btn-ghost"   onclick="exportCSV()">Exporter CSV</button>
  <button class="btn btn-primary" onclick="addSynthCol()">+ Ajouter colonne synthese</button>
  <button class="btn btn-primary" onclick="saveFirebase()">Sauvegarder</button>
  <button class="btn btn-ghost"   onclick="openChart()">Graphique APPROS</button>
</div>

<div class="chart-modal-overlay" id="chartOverlay">
  <div class="chart-modal">
    <button class="close-btn" onclick="closeChart()">&#x2715;</button>
    <h2>Taux de realisation APPROS - par journee</h2>
    <canvas id="approsChart" height="320"></canvas>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAYRfaLdg--2SkTCyeNa1Xsq2vpSRBz8kY",
  authDomain: "pilotagem00.firebaseapp.com",
  projectId: "pilotagem00",
  storageBucket: "pilotagem00.firebasestorage.app",
  messagingSenderId: "455481915450",
  appId: "1:455481915450:web:cbc9430df70b6f4107dd03"
};

const FIRESTORE_DOC = "suivi/default";

const ENGINS_CONFIG = [
  { id:'p18', defaultLabel:'V16 P18', sections:['APPROS','PIECES DEPOSEES'] },
  { id:'p26', defaultLabel:'V16 P26', sections:['APPROS','PIECES DEPOSEES'] },
];
const D_FIXED = 4;

let S = {};
let headersData = { dates: [], jours: [] };
let enginLabels = {};
let synthCols = [];
let db = null;
let saveTimer = null;

// AUTH
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

auth.onAuthStateChanged(function(user) {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  document.getElementById('userEmail').textContent = '👤 ' + user.email;
  document.getElementById('userBadge').style.display = 'flex';
  db = firebase.firestore();
  setStatus('sync', 'Chargement...');
  loadFirebase();
});

function doLogout() {
  auth.signOut().then(function() { window.location.href = 'login.html'; });
}

function setStatus(type, msg) {
  var el = document.getElementById('fbStatus');
  el.className = type;
  el.textContent = msg;
}

async function loadFirebase() {
  try {
    var parts = FIRESTORE_DOC.split('/');
    var snap = await db.collection(parts[0]).doc(parts[1]).get();
    if (snap.exists) {
      var data = snap.data();
      if (data.S)           S           = data.S;
      if (data.headersData) headersData = data.headersData;
      if (data.enginLabels) enginLabels = data.enginLabels;
      if (data.synthCols)   synthCols   = data.synthCols;
      if (data.dateJour)    document.getElementById('dateJour').value = data.dateJour;
      setStatus('ok', 'Synchronise');
    } else {
      setStatus('ok', 'Nouveau document');
    }
  } catch(e) {
    setStatus('err', 'Erreur lecture Firebase');
    console.error(e);
    loadLocal();
  }
  finishBoot();
}

async function saveFirebase() {
  var payload = {
    S: S,
    headersData: headersData,
    enginLabels: enginLabels,
    synthCols: synthCols,
    dateJour: document.getElementById('dateJour').value,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem('sp_backup', JSON.stringify(payload));
  if (!db) { setStatus('err', 'Firebase non connecte'); return; }
  try {
    setStatus('sync', 'Sauvegarde...');
    var parts = FIRESTORE_DOC.split('/');
    await db.collection(parts[0]).doc(parts[1]).set(payload);
    setStatus('ok', 'Sauvegarde ' + new Date().toLocaleTimeString('fr-FR'));
  } catch(e) {
    setStatus('err', 'Erreur sauvegarde');
    console.error(e);
  }
}

function scheduleAutoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() { saveFirebase(); }, 3000);
  setStatus('sync', 'Modifications en cours...');
}

function loadLocal() {
  try {
    var bk = localStorage.getItem('sp_backup');
    if (!bk) return;
    var data = JSON.parse(bk);
    if (data.S)           S           = data.S;
    if (data.headersData) headersData = data.headersData;
    if (data.enginLabels) enginLabels = data.enginLabels;
    if (data.synthCols)   synthCols   = data.synthCols;
    if (data.dateJour)    document.getElementById('dateJour').value = data.dateJour;
  } catch(e) { console.error(e); }
}

function init() {
  S = {}; enginLabels = {};
  ENGINS_CONFIG.forEach(function(e) {
    enginLabels[e.id] = e.defaultLabel;
    S[e.id] = { loco: Array(D_FIXED).fill('') };
    e.sections.forEach(function(s) {
      S[e.id][s] = Array.from({length: D_FIXED}, function() { return {note:'',score:'',dot:null}; });
    });
  });
  headersData = { dates: Array(D_FIXED).fill(''), jours: ['J0','J-1','J-2','J-3'] };
}

function makeSynthColData() {
  var col = { id: 'sc_' + Date.now(), date: '', jour: '', enginData: {} };
  ENGINS_CONFIG.forEach(function(e) {
    col.enginData[e.id] = { loco: '' };
    e.sections.forEach(function(s) { col.enginData[e.id][s] = { note:'', dot:null, score:'' }; });
  });
  return col;
}

function fmt(date, offset) {
  var d = new Date(date);
  d.setDate(d.getDate() - offset);
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);
}

function setDatesFromBase() {
  var v = document.getElementById('dateJour').value;
  if (!v) return;
  var base = new Date(v+'T00:00:00');
  for (var i=0; i<D_FIXED; i++) headersData.dates[i] = fmt(base, i);
}

function build() { buildHeader(); buildBody(); }

function buildHeader() {
  var row = document.getElementById('headerRow');
  while (row.children.length > 1) row.removeChild(row.lastChild);
  for (var i=0; i<D_FIXED; i++) {
    var th = document.createElement('th');
    th.className = 'th-top';
    th.appendChild(makeInput('th-header-input th-date', headersData.dates[i], 'Date', makeUpdater(headersData.dates, i)));
    th.appendChild(makeInput('th-header-input th-j',    headersData.jours[i], 'Jour', makeJourUpdater(i)));
    row.appendChild(th);
  }
  synthCols.forEach(function(col) {
    var th = document.createElement('th');
    th.className = 'th-top synth-col';
    th.appendChild(makeInput('th-header-input th-date', col.date, 'Date', function(v){ col.date=v; scheduleAutoSave(); }));
    th.appendChild(makeInput('th-header-input th-j',    col.jour, 'Jour', function(v){ col.jour=v; scheduleAutoSave(); }));
    var delBtn = document.createElement('button');
    delBtn.className = 'btn-del-col';
    delBtn.textContent = 'X Supprimer';
    (function(c){ delBtn.onclick = function(){ synthCols = synthCols.filter(function(x){ return x.id!==c.id; }); build(); scheduleAutoSave(); }; })(col);
    th.appendChild(delBtn);
    row.appendChild(th);
  });
}

function makeUpdater(arr, idx) { return function(v){ arr[idx]=v; scheduleAutoSave(); }; }
function makeJourUpdater(idx) { return function(v){ headersData.jours[idx]=v; scheduleAutoSave(); }; }

function buildBody() {
  var tb = document.getElementById('tbody');
  tb.innerHTML = '';
  ENGINS_CONFIG.forEach(function(e) {
    // Ligne ENGIN
    var rEngin = document.createElement('tr'); rEngin.className = 'row-engin';
    var tdLbl = document.createElement('td'); tdLbl.textContent = 'ENGIN'; rEngin.appendChild(tdLbl);
    for (var d=0; d<D_FIXED; d++) {
      var td = document.createElement('td'); td.className = 'loco-cell';
      td.appendChild(makeLoco_fixed(e.id, d)); rEngin.appendChild(td);
    }
    synthCols.forEach(function(col) {
      var td = document.createElement('td'); td.className = 'loco-cell'; td.style.background='#d4dff0';
      td.appendChild(makeLoco_synth(col, e.id)); rEngin.appendChild(td);
    });
    tb.appendChild(rEngin);

    // Ligne libelle
    var rTitle = document.createElement('tr'); rTitle.className = 'row-label';
    var tdT = document.createElement('td'); tdT.className = 'label';
    tdT.appendChild(makeEnginLabelInput(e.id)); rTitle.appendChild(tdT);
    for (var d2=0; d2<D_FIXED; d2++) { var td2=document.createElement('td'); td2.className='data-cell'; rTitle.appendChild(td2); }
    synthCols.forEach(function(){ var td=document.createElement('td'); td.className='data-cell synth-cell'; rTitle.appendChild(td); });
    tb.appendChild(rTitle);

    // Sections
    e.sections.forEach(function(s) {
      var rNote = document.createElement('tr'); rNote.className = 'row-label';
      var tdSL = document.createElement('td'); tdSL.className = 'label'; tdSL.textContent = s; rNote.appendChild(tdSL);
      for (var d3=0; d3<D_FIXED; d3++) {
        var td3 = document.createElement('td'); td3.className = 'data-cell';
        td3.appendChild(makeNote_fixed(e.id, s, d3)); rNote.appendChild(td3);
      }
      synthCols.forEach(function(col) {
        var td = document.createElement('td'); td.className = 'data-cell synth-cell';
        td.appendChild(makeNote_synth(col, e.id, s)); rNote.appendChild(td);
      });
      tb.appendChild(rNote);

      var rScore = document.createElement('tr'); rScore.className = 'row-score';
      var tdSS = document.createElement('td'); tdSS.className = 'label'; rScore.appendChild(tdSS);
      for (var d4=0; d4<D_FIXED; d4++) {
        var td4 = document.createElement('td');
        td4.appendChild(makeScoreInner_fixed(e.id, s, d4)); rScore.appendChild(td4);
      }
      synthCols.forEach(function(col) {
        var td = document.createElement('td'); td.className = 'synth-cell';
        td.appendChild(makeScoreInner_synth(col, e.id, s)); rScore.appendChild(td);
      });
      tb.appendChild(rScore);
    });
  });
}

function makeInput(cls, val, placeholder, onInput) {
  var inp = document.createElement('input');
  inp.type = 'text'; inp.className = cls; inp.placeholder = placeholder; inp.value = val || '';
  inp.oninput = function(e) { onInput(e.target.value); };
  return inp;
}

function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

function makeLoco_fixed(eid, d) {
  var inp = document.createElement('input');
  inp.className='loco'; inp.type='text'; inp.placeholder='N engin...'; inp.value=S[eid].loco[d];
  (function(ei,di){ inp.oninput = function(){ S[ei].loco[di]=inp.value; scheduleAutoSave(); }; })(eid,d);
  return inp;
}
function makeLoco_synth(col, eid) {
  var inp = document.createElement('input');
  inp.className='loco'; inp.type='text'; inp.placeholder='N engin...'; inp.value=col.enginData[eid].loco;
  inp.oninput = function(){ col.enginData[eid].loco=inp.value; scheduleAutoSave(); };
  return inp;
}
function makeNote_fixed(eid, s, d) {
  var ta = document.createElement('textarea');
  ta.className='note'; ta.placeholder='Remarque...'; ta.value=S[eid][s][d].note;
  (function(ei,si,di){ ta.oninput = function(){ S[ei][si][di].note=ta.value; autoResize(ta); scheduleAutoSave(); }; })(eid,s,d);
  requestAnimationFrame(function(){ autoResize(ta); });
  return ta;
}
function makeNote_synth(col, eid, s) {
  var ta = document.createElement('textarea');
  ta.className='note'; ta.placeholder='Remarque...'; ta.value=col.enginData[eid][s].note;
  ta.oninput = function(){ col.enginData[eid][s].note=ta.value; autoResize(ta); scheduleAutoSave(); };
  requestAnimationFrame(function(){ autoResize(ta); });
  return ta;
}
function makeEnginLabelInput(eid) {
  var inp = document.createElement('input');
  inp.className='engin-label-input'; inp.type='text'; inp.value=enginLabels[eid]||'';
  inp.oninput = function(){ enginLabels[eid]=inp.value; scheduleAutoSave(); };
  return inp;
}

function makeDot(getVal, setVal, color) {
  var btn = document.createElement('button');
  btn.className = 'dot-btn ' + (getVal()===color ? color : 'off');
  btn.title = color==='green'?'OK':'NOK';
  btn.setAttribute('aria-label', color==='green'?'OK':'NOK');
  btn.onclick = function(){ setVal(getVal()===color ? null : color); build(); scheduleAutoSave(); };
  return btn;
}

function makeScoreInner_fixed(eid, s, d) {
  var inner = document.createElement('div'); inner.className = 'score-inner';
  (function(ei,si,di){
    inner.appendChild(makeDot(function(){ return S[ei][si][di].dot; }, function(v){ S[ei][si][di].dot=v; }, 'green'));
    inner.appendChild(makeDot(function(){ return S[ei][si][di].dot; }, function(v){ S[ei][si][di].dot=v; }, 'red'));
    var inp = document.createElement('input');
    inp.className='score'; inp.type='text'; inp.placeholder='0/0'; inp.value=S[ei][si][di].score;
    inp.oninput = function(){ S[ei][si][di].score=inp.value; scheduleAutoSave(); };
    inner.appendChild(inp);
  })(eid,s,d);
  return inner;
}
function makeScoreInner_synth(col, eid, s) {
  var data = col.enginData[eid][s];
  var inner = document.createElement('div'); inner.className = 'score-inner';
  inner.appendChild(makeDot(function(){ return data.dot; }, function(v){ data.dot=v; }, 'green'));
  inner.appendChild(makeDot(function(){ return data.dot; }, function(v){ data.dot=v; }, 'red'));
  var inp = document.createElement('input');
  inp.className='score'; inp.type='text'; inp.placeholder='0/0'; inp.value=data.score;
  inp.oninput = function(){ data.score=inp.value; scheduleAutoSave(); };
  inner.appendChild(inp);
  return inner;
}

function addSynthCol() { synthCols.push(makeSynthColData()); build(); scheduleAutoSave(); }

function resetAll() {
  if (!confirm('Reinitialiser toutes les donnees ?')) return;
  init(); synthCols = []; setDatesFromBase(); build(); scheduleAutoSave();
}

function exportCSV() {
  var rows = [['Engin','Section','Jour','Date','N Engin','Remarque','Score','Statut']];
  ENGINS_CONFIG.forEach(function(e) {
    e.sections.forEach(function(s) {
      for (var d=0; d<D_FIXED; d++) {
        var c = S[e.id][s][d];
        rows.push([enginLabels[e.id]||e.defaultLabel, s, headersData.jours[d]||'J-'+d, headersData.dates[d]||'', S[e.id].loco[d]||'', c.note||'', c.score||'', c.dot==='green'?'OK':c.dot==='red'?'NOK':'']);
      }
    });
  });
  synthCols.forEach(function(col, ci) {
    ENGINS_CONFIG.forEach(function(e) {
      e.sections.forEach(function(s) {
        var data = col.enginData[e.id][s];
        rows.push([enginLabels[e.id]||e.defaultLabel, s, col.jour||'Synthese '+(ci+1), col.date||'', col.enginData[e.id].loco||'', data.note||'', data.score||'', data.dot==='green'?'OK':data.dot==='red'?'NOK':'']);
      });
    });
  });
  var csv = '\ufeff' + rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(';'); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='suivi_prod_'+(document.getElementById('dateJour').value||'export')+'.csv';
  a.click(); URL.revokeObjectURL(url);
}

// GRAPHIQUE
function parseScore(str) {
  if (!str || !str.trim()) return null;
  var m = str.trim().match(/^(\d+(?:[.,]\d+)?)\s*\/\s*(\d+(?:[.,]\d+)?)$/);
  if (!m) return null;
  var num = parseFloat(m[1].replace(',','.')), den = parseFloat(m[2].replace(',','.'));
  if (den===0) return null;
  return { num:num, den:den };
}

function buildChartData() {
  var cols = [];
  for (var d=0; d<D_FIXED; d++) {
    (function(di){
      cols.push({ label: headersData.dates[di]||headersData.jours[di]||('J-'+di), getScore: function(eid,sec){ return S[eid][sec][di].score; } });
    })(d);
  }
  synthCols.forEach(function(col) {
    cols.push({ label: col.date||col.jour||'Synthese', getScore: function(eid,sec){ return col.enginData[eid][sec].score; } });
  });
  var labels=[], values=[];
  cols.forEach(function(col) {
    var totalNum=0, totalDen=0, hasData=false;
    ENGINS_CONFIG.forEach(function(e) {
      var p = parseScore(col.getScore(e.id,'APPROS'));
      if (p) { totalNum+=p.num; totalDen+=p.den; hasData=true; }
    });
    labels.push(col.label);
    values.push(hasData && totalDen>0 ? Math.round((totalNum/totalDen)*1000)/10 : null);
  });
  return { labels:labels, values:values };
}

function openChart()  { document.getElementById('chartOverlay').classList.add('open'); drawChart(); }
function closeChart() { document.getElementById('chartOverlay').classList.remove('open'); }
document.getElementById('chartOverlay').addEventListener('click', function(e) { if (e.target===this) closeChart(); });

function drawChart() {
  var data = buildChartData();
  var labels = data.labels, values = data.values;
  var canvas = document.getElementById('approsChart');
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 800, H = 320;
  canvas.width = W; canvas.height = H;
  var PAD = { top:30, right:30, bottom:50, left:55 };
  var cW = W-PAD.left-PAD.right, cH = H-PAD.top-PAD.bottom;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  var n = labels.length;
  if (n===0) { ctx.fillStyle='#888'; ctx.font='13px Segoe UI,sans-serif'; ctx.textAlign='center'; ctx.fillText('Aucune donnee APPROS (format X/Y requis)',W/2,H/2); return; }
  for (var pct=0; pct<=100; pct+=10) {
    var y = PAD.top+cH-(pct/100)*cH;
    ctx.strokeStyle='#e0ddd6'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(PAD.left+cW,y); ctx.stroke();
    ctx.fillStyle='#888'; ctx.font='11px Segoe UI,sans-serif'; ctx.textAlign='right';
    ctx.fillText(pct+'%', PAD.left-6, y+4);
  }
  var step = cW/Math.max(n-1,1);
  ctx.fillStyle='#555'; ctx.font='11px Segoe UI,sans-serif'; ctx.textAlign='center';
  labels.forEach(function(lbl,i){ var x = n===1?PAD.left+cW/2:PAD.left+i*step; ctx.fillText(lbl, x, H-PAD.bottom+18); });
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD.left,PAD.top); ctx.lineTo(PAD.left,PAD.top+cH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD.left,PAD.top+cH); ctx.lineTo(PAD.left+cW,PAD.top+cH); ctx.stroke();
  var pts = values.map(function(v,i){ if(v===null) return null; return { x: n===1?PAD.left+cW/2:PAD.left+i*step, y: PAD.top+cH-(v/100)*cH, v:v }; });
  ctx.strokeStyle='#f5a623'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath(); var started=false;
  pts.forEach(function(pt){ if(!pt){started=false;return;} if(!started){ctx.moveTo(pt.x,pt.y);started=true;}else ctx.lineTo(pt.x,pt.y); });
  ctx.stroke();
  pts.forEach(function(pt){
    if(!pt) return;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,4.5,0,Math.PI*2); ctx.fillStyle='#f5a623'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#1a1917'; ctx.font='bold 11px Segoe UI,sans-serif'; ctx.textAlign='center';
    ctx.fillText(pt.v+'%', pt.x, pt.y-10);
  });
}

function finishBoot() {
  if (!localStorage.getItem('sp_backup') && !S.p18) setDatesFromBase();
  build();
  document.getElementById('dateJour').addEventListener('change', function(){ setDatesFromBase(); build(); });
}

var now = new Date();
document.getElementById('dateJour').value = now.getFullYear()+'-'+('0'+(now.getMonth()+1)).slice(-2)+'-'+('0'+now.getDate()).slice(-2);
init();
</script>
